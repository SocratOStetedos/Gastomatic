[pytest]
# Nom affiché dans le rapport
console_output_style = progress

# Dossier contenant les tests
testpaths = tests

# Options par défaut à chaque exécution :
# -v  : mode verbeux (affiche chaque test individuellement)
# --tb=short : affiche un traceback court en cas d'erreur
addopts = -v --tb=short

# Marqueurs personnalisés (évite les warnings PyTest)
markers =
    smoke: Tests rapides de vérification de base
    slow: Tests plus lents (ex: tests de performance)
    integration: Tests d'intégration avec l'API réelle
